<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  .graphic {
    width: 1024px;
    height: 500px;
    position: relative;
    background:
      radial-gradient(120% 140% at 88% 18%, rgba(255,90,60,0.55) 0%, rgba(255,90,60,0) 55%),
      linear-gradient(135deg, #0a2c33 0%, #0e7c91 48%, #12424c 100%);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  /* soft coastal glow lower-left */
  .graphic::after {
    content: "";
    position: absolute;
    left: -10%;
    bottom: -40%;
    width: 60%;
    height: 100%;
    background: radial-gradient(circle, rgba(232,163,23,0.22) 0%, rgba(232,163,23,0) 60%);
    pointer-events: none;
  }
  .left {
    flex: 1;
    padding: 0 0 0 64px;
    z-index: 2;
  }
  .wordmark { width: 430px; height: auto; display: block; }
  .tagline {
    margin-top: 22px;
    color: #fafaf7;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.2px;
    line-height: 1.25;
    max-width: 540px;
  }
  .tagline .accent { color: #ff7559; }
  .sub {
    margin-top: 14px;
    color: rgba(250,250,247,0.78);
    font-size: 19px;
    font-weight: 500;
  }
  .right {
    width: 360px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    position: relative;
  }
  .iconwrap {
    width: 230px;
    height: 230px;
    border-radius: 52px;
    overflow: hidden;
    box-shadow: 0 30px 70px rgba(0,0,0,0.45), inset 0 0 0 1.5px rgba(255,255,255,0.12);
    transform: rotate(-6deg);
  }
  .iconwrap img { width: 100%; height: 100%; display: block; }
</style>
</head>
